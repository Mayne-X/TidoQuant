services:
  timescaledb:
    image: timescale/timescaledb-ha:pg17
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=tidoquant
      - POSTGRES_DB=tidoquant
      - POSTGRES_USER=tidoquant
    volumes:
      - timescale_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidoquant"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    volumes:
      - ./journal:/app/journal
      - ./reports:/app/reports
      - ./skills:/app/skills
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - TIMESCALE_URL=postgresql://tidoquant:tidoquant@timescaledb:5432/tidoquant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4900:4900"
    depends_on:
      timescaledb:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    ports:
      - "5000:3000"
    environment:
      - PORT=3000
      - API_URL=http://backend:4900
    depends_on:
      - backend

volumes:
  timescale_data:
